<!-- 本文件是 GoodHR 登录验证码邮件 HTML 模板，使用黑绿终端风并适配移动端。 -->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoodHR 登录验证码</title>
    <style>
      @media only screen and (max-width: 620px) {
        .wrap { padding: 14px !important; }
        .panel { width: 100% !important; }
        .content { padding: 22px 18px !important; }
        .title { font-size: 24px !important; }
        .code { font-size: 32px !important; letter-spacing: 6px !important; padding: 14px 18px !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#020202;font-family:'Courier New','Microsoft YaHei',monospace;color:#00ff66;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#020202;padding:28px 0;">
      <tr>
        <td class="wrap" align="center" style="padding:0 16px;">
          <table class="panel" role="presentation" width="580" cellspacing="0" cellpadding="0" style="width:580px;max-width:100%;background:#050505;border:1px solid #333333;">
            <tr>
              <td style="padding:9px 12px;background:#0d0d0d;border-bottom:1px solid #333333;">
                <span style="display:inline-block;width:10px;height:10px;background:#e33;margin-right:7px;"></span>
                <span style="display:inline-block;width:10px;height:10px;background:#e83;margin-right:7px;"></span>
                <span style="display:inline-block;width:10px;height:10px;background:#3a3;margin-right:12px;"></span>
                <span style="font-size:12px;color:#dddddd;">GoodHR 登录终端</span>
              </td>
            </tr>
            <tr>
              <td class="content" style="padding:30px 34px;">
                <div style="font-size:13px;color:#00ff66;margin-bottom:10px;">$ login --goodhr</div>
                <h1 class="title" style="margin:0 0 14px;font-size:30px;line-height:1.25;font-weight:400;color:#ffffff;">登录验证码</h1>
                <p style="margin:0 0 22px;font-size:15px;line-height:1.8;color:#dddddd;">你正在登录 GoodHR，请使用下面的验证码完成验证。</p>
                <div align="center" style="margin:26px 0;">
                  <span class="code" style="display:inline-block;padding:16px 30px;border:1px solid #00ff66;background:#0d0d0d;color:#00ff66;font-size:38px;font-weight:700;letter-spacing:9px;">{{.Code}}</span>
                </div>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin-top:22px;">
                  <tr>
                    <td style="padding:12px;border-top:1px solid #222222;color:#dddddd;font-size:14px;line-height:1.8;">验证码 5 分钟内有效，请勿转发给他人。如果不是你本人操作，可以忽略这封邮件。</td>
                  </tr>
                </table>
                <p style="margin:18px 0 0;font-size:13px;color:#888888;">GoodHR 招聘自动化工具</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
