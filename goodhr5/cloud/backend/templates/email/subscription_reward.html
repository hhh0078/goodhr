<!-- 本文件是 GoodHR 会员时间变动提醒邮件 HTML 模板，使用黑绿终端风并适配移动端。 -->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoodHR 会员时间变动提醒</title>
    <style>
      @media only screen and (max-width: 620px) {
        .wrap { padding: 14px !important; }
        .panel { width: 100% !important; }
        .content { padding: 22px 18px !important; }
        .title { font-size: 24px !important; }
        .label, .value { display: block !important; width: auto !important; }
        .label { padding-bottom: 4px !important; border-bottom: 0 !important; }
        .value { padding-top: 0 !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#020202;font-family:'Courier New','Microsoft YaHei',monospace;color:#00ff66;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#020202;padding:28px 0;">
      <tr>
        <td class="wrap" align="center" style="padding:0 16px;">
          <table class="panel" role="presentation" width="580" cellspacing="0" cellpadding="0" style="width:580px;max-width:100%;background:#050505;border:1px solid #333333;">
            <tr>
              <td style="padding:9px 12px;background:#0d0d0d;border-bottom:1px solid #333333;">
                <span style="display:inline-block;width:10px;height:10px;background:#e33;margin-right:7px;"></span>
                <span style="display:inline-block;width:10px;height:10px;background:#e83;margin-right:7px;"></span>
                <span style="display:inline-block;width:10px;height:10px;background:#3a3;margin-right:12px;"></span>
                <span style="font-size:12px;color:#dddddd;">GoodHR 会员终端</span>
              </td>
            </tr>
            <tr>
              <td class="content" style="padding:30px 34px;">
                <div style="font-size:13px;color:#00ff66;margin-bottom:10px;">$ subscription --changed</div>
                <h1 class="title" style="margin:0 0 14px;font-size:30px;line-height:1.25;font-weight:400;color:#ffffff;">会员时间已更新</h1>
                <p style="margin:0 0 22px;font-size:15px;line-height:1.8;color:#dddddd;">你的 GoodHR 会员时间发生了变化，详情如下。</p>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;font-size:14px;color:#dddddd;">
                  <tr>
                    <td class="label" style="width:120px;padding:13px 12px;border-top:1px solid #222222;background:#0d0d0d;color:#00ff66;">变动原因</td>
                    <td class="value" style="padding:13px 12px;border-top:1px solid #222222;color:#ffffff;">{{.Reason}}</td>
                  </tr>
                  <tr>
                    <td class="label" style="width:120px;padding:13px 12px;border-top:1px solid #222222;background:#0d0d0d;color:#00ff66;">变动天数</td>
                    <td class="value" style="padding:13px 12px;border-top:1px solid #222222;color:#ffffff;">{{.DaysText}}</td>
                  </tr>
                  <tr>
                    <td class="label" style="width:120px;padding:13px 12px;border-top:1px solid #222222;background:#0d0d0d;color:#00ff66;">会员类型</td>
                    <td class="value" style="padding:13px 12px;border-top:1px solid #222222;color:#ffffff;">{{.MemberType}}</td>
                  </tr>
                  <tr>
                    <td class="label" style="width:120px;padding:13px 12px;border-top:1px solid #222222;background:#0d0d0d;color:#00ff66;">到期时间</td>
                    <td class="value" style="padding:13px 12px;border-top:1px solid #222222;color:#ffffff;">{{.ExpiresAt}}</td>
                  </tr>
                  {{if .RelatedEmail}}
                  <tr>
                    <td class="label" style="width:120px;padding:13px 12px;border-top:1px solid #222222;background:#0d0d0d;color:#00ff66;">关联用户</td>
                    <td class="value" style="padding:13px 12px;border-top:1px solid #222222;color:#ffffff;">{{.RelatedEmail}}</td>
                  </tr>
                  {{end}}
                </table>
                <p style="margin:22px 0 0;font-size:13px;line-height:1.8;color:#888888;">感谢使用 GoodHR。关键词筛选永久免费，AI 筛选和自动跟进可按需升级。</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
